namespace: rtsp

image:
  registry: rtsp
  pullPolicy: IfNotPresent

services:
  ingestion-service:
    replicaCount: 2
    port: 3000
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  processing-service:
    replicaCount: 2
    port: 3001
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  alert-service:
    replicaCount: 2
    port: 3002
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  api-gateway:
    replicaCount: 2
    port: 3003
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

config:
  kafka:
    brokers: "kafka:29092"
  rabbitmq:
    url: "amqp://rtsp:rtsp@rabbitmq:5672"
    queue: "alerts"
  mqtt:
    host: "mqtt"
    port: 1883
  postgres:
    host: "postgres"
    port: 5432
    user: "rtsp"
    database: "rtsp"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

ingress:
  enabled: false
  className: nginx
  hostname: rtsp.example.com

persistence:
  enabled: false