apiVersion: v1
kind: ConfigMap
metadata:
  name: rtsp-config
  namespace: rtsp
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  KAFKA_BROKERS: "kafka:29092"
  RABBITMQ_URL: "amqp://rtsp:rtsp@rabbitmq:5672"
  RABBITMQ_QUEUE: "alerts"
  MQTT_HOST: "mqtt"
  MQTT_PORT: "1883"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "rtsp"
  POSTGRES_DB: "rtsp"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rtsp-service-config
  namespace: rtsp
data:
  INGESTION_SERVICE_PORT: "3000"
  PROCESSING_SERVICE_PORT: "3001"
  ALERT_SERVICE_PORT: "3002"
  API_GATEWAY_PORT: "3003"