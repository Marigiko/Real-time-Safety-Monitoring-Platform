apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: rtsp
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: ingestion-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: rtsp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      containers:
        - name: ingestion-service
          image: rtsp/ingestion-service:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: MQTT_HOST
              valueFrom:
                configMapKeyRef:
                  name: rtsp-config
                  key: MQTT_HOST
            - name: MQTT_PORT
              valueFrom:
                configMapKeyRef:
                  name: rtsp-config
                  key: MQTT_PORT
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: rtsp-config
                  key: KAFKA_BROKERS
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5