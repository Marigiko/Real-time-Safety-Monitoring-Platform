apiVersion: v1
kind: Service
metadata:
  name: alert-service
  namespace: rtsp
spec:
  ports:
    - port: 3002
      targetPort: 3002
  selector:
    app: alert-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-service
  namespace: rtsp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alert-service
  template:
    metadata:
      labels:
        app: alert-service
    spec:
      containers:
        - name: alert-service
          image: rtsp/alert-service:latest
          ports:
            - containerPort: 3002
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3002"
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: rtsp-config
                  key: RABBITMQ_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5